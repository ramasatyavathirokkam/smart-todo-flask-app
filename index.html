<!DOCTYPE html>
<html>

<head>

    <title>Smart ToDo App</title>
    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #667eea, #764ba2);
            text-align: center;
            color: white;
        }
        .container {
            background: white;
            color: black;
            padding: 30px;
            margin: 80px auto;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0px,10px,30px,rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: centre;

        }
        input,select {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            width: 60%;
            border: 1px solid #ccc;

        }
        button {
            width: 150px;
            padding: 12px;
            margin-top: 10px;

            border: none;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            margin-left: auto;
            margin-right: auto;

        }

        li {
            margin: 10px;
            padding: 10px;
            background: #f4f4f4;
            border-radius: 8px;
            list-style: none;
        }
        .done {
            text-decoration: line-through;
            color: gray;
        }
        .high{color: red;}
        .medium{color:orange;}
        .low{color:green;}

        .form-row {
            display: flex;
            flex-direction: column;
            gap:10px;
        }
        .form-row input,
        .form-row select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1pz solid #ccc;

        }
        .form-row button{
            width: 120px;
            align-self: center;
            margin-top: 10px;
        }
        form{
            width: 100%;

        }

        form input,
        form select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;

        }
    </style>
</head>
<body> 
<div class = "container">
    <h2>Smart To-Do list</h2>

    <form action = "/add" method = "POST" class = "form-row">
        <input type="text" name = "task" placeholder = "Enter Task" required>
        <select name="priority">
            <option>high</option>
            <option>medium</option>
            <option>low</option>
        </select>

        <input type ="date" name = "due_date">
        <button>Add</button>

    </form>
    <ul>
        {% for task in tasks %}
        <li>
            <h3 class = "{{'done' if tasks.done else '' }}">
                {{ task.name }} 
            </h3>

            <p>
                Priority: {{ task.priority }}
            </p>

            <p>{{ task.due_date }}</p>

            <a href = "/done/{{loop.index0}}">✅</a>
            <a href="/delete/{{loop.index0}}">🗑️</a>
        </li>
        {% endfor %}
    </ul>
</div>
</body>
</html>
